server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint — rewrite clean URL to static JSON
    location = /api/health {
        try_files /api/health.json =404;
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Immutable hashed assets (Vite output)
    location /assets/ {
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Security headers on all other responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA catch-all — serve static files first, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable server version in headers
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
